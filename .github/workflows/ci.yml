name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.x"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env for CI
        run: |
          echo "GOOGLE_API_CLIENT_ID=ci-placeholder.apps.googleusercontent.com" > .env
          echo "GOOGLE_SERVER_CLIENT_ID=ci-placeholder.apps.googleusercontent.com" >> .env
          echo "API_URL=https://api.example.com" >> .env

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

  build-apk:
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.x"
          channel: stable
          cache: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env for CI
        run: |
          echo "GOOGLE_API_CLIENT_ID=ci-placeholder.apps.googleusercontent.com" > .env
          echo "GOOGLE_SERVER_CLIENT_ID=ci-placeholder.apps.googleusercontent.com" >> .env
          echo "API_URL=https://api.example.com" >> .env

      - name: Build APK (debug)
        run: flutter build apk --debug
