name: cosmic_explorer
description: "Gerçek zamanlı gök haritası ve astronomi keşif uygulaması"
publish_to: 'none'
version: 1.0.2+2

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sensors_plus: ^6.1.1
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  shared_preferences: ^2.5.4
  google_fonts: ^6.2.1
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  dio: ^5.4.0
  google_sign_in: ^6.2.1
  google_mobile_ads: ^5.1.0
  flutter_secure_storage: ^9.0.0
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  share_plus: ^10.1.0
  flutter_dotenv: ^5.1.0
  flutter_local_notifications: ^17.2.2
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter
  flutter_launcher_icons: "^0.13.1"
  flutter_native_splash: "^2.4.0"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"

flutter_native_splash:
  color: "#0B0B11"
  image: "assets/images/splash_cover.png"
  android_12:
    image: "assets/images/splash_cover.png"
  fullscreen: true
